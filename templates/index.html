<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineReview | App Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1f1f1f !important; border-bottom: 2px solid #e50914; }
        .card { background-color: #1f1f1f; border: none; border-radius: 12px; transition: transform 0.2s; color: white; }
        .card:hover { transform: translateY(-5px); }
        .btn-netflix { background-color: #e50914; color: white; border-radius: 4px; font-weight: bold; }
        .btn-netflix:hover { background-color: #b20710; color: white; }
        .rating-badge { background-color: #ffc107; color: #000; font-weight: bold; }
        .form-control, .form-control:focus { background-color: #333; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container">
        <a class="navbar-brand text-uppercase fw-bold" href="#">🎬 CineReview</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 shadow mb-4">
                <h4 class="mb-3">Submit a Review</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Movie Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Inception" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rating (1-5)</label>
                        <select name="rating" class="form-select bg-dark text-white border-secondary">
                            <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                            <option value="4">⭐⭐⭐⭐ (4/5)</option>
                            <option value="3">⭐⭐⭐ (3/5)</option>
                            <option value="2">⭐⭐ (2/5)</option>
                            <option value="1">⭐ (1/5)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Your Comment</label>
                        <textarea name="comment" class="form-control" rows="3" placeholder="What did you think?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-netflix w-100">Post Review</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <h3 class="mb-4">Recent Reviews</h3>
            {% if not reviews %}
                <p class="text-muted italic">No reviews yet. Be the first to write one!</p>
            {% endif %}
            
            {% for review in reviews %}
            <div class="card mb-3 p-3 shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-1 text-info">{{ review.title }}</h5>
                    <span class="badge rating-badge">{{ review.rating }} / 5</span>
                </div>
                <p class="card-text mt-2 text-secondary">"{{ review.comment }}"</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
